# =============================================================================
# user-service/src/main/resources/application.yml
# Self-contained local config — runs from Eclipse with only PostgreSQL up.
# Eureka / Config-Server / Kafka / Redis are OPTIONAL (disabled by default).
# Activate "prod" profile to enable the full microservices infrastructure.
# =============================================================================
server:
  port: 8081

spring:
  application:
    name: user-service

  # Config-Server is optional — service will start even if it is not running
  config:
    import: optional:configserver:http://configuser:configpass123@localhost:8888

  cloud:
    config:
      enabled: false        # local default: don't require Config Server
      fail-fast: false

  # ---------- PostgreSQL (single DB, dedicated schema per service) ----------
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: UserServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: user_service

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: user_service
    default-schema: user_service
    create-schemas: true

  # ---------- Cache: in-memory by default; use Redis only when prod profile ---
  cache:
    type: simple

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ---------- Kafka producer (auto-config will not block startup) -----------
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ---------- Eureka: disabled by default (enable in prod profile) -------------
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://eurekauser:eurekapass123@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ---------- JWT --------------------------------------------------------------
jwt:
  secret: ecommerce-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration-minutes: 60

# ---------- Application properties ------------------------------------------
app:
  kafka:
    topic:
      audit: audit.events
      user:  user.events

# ---------- Springdoc OpenAPI / Swagger UI ----------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  packages-to-scan: com.ecommerce.userservice.controller

# ---------- Actuator --------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: user-service

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG

# =============================================================================
# PROD profile - turns on Eureka + Config Server + Redis cache for full stack
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    config:
      enabled: true
      fail-fast: false
  cache:
    type: redis

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
