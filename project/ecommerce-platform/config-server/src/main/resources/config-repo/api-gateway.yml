# =============================================================================
# api-gateway.yml — Config Server config for API Gateway
# =============================================================================
server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle:   4
          min-idle:   1

jwt:
  secret: ecommerce-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration-minutes: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    tags:
      application: api-gateway

logging:
  level:
    root: INFO
    com.ecommerce.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
