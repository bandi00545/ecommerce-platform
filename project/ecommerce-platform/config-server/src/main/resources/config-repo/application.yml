# =============================================================================
# application.yml - Config served to ALL services (global defaults)
# Stored in Config Server's config-repo
# =============================================================================

# Each service can override any of these in its own {service-name}.yml

spring:
  # Jackson - consistent JSON across all services
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Kolkata
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

  # JPA - common settings (each service defines its own datasource)
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC

  # Flyway - database migrations run automatically on service startup
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Actuator - expose health/metrics/info for all services
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Eureka Client - all services register here (overridden per service)
eureka:
  client:
    service-url:
      defaultZone: http://eurekauser:eurekapass123@localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}

# Resilience4j - global defaults (each service tunes per CB name)
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
  timelimiter:
    configs:
      default:
        timeout-duration: 5s

# Logging
logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId:-NOREQID}] %logger{50} - %msg%n"
