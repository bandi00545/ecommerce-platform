# =============================================================================
# user-service.yml - Configuration for User Service
# Served by Config Server at: GET /user-service/default
# =============================================================================

server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: UserServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: user_service

  flyway:
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

  # Redis Cache
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30 minutes in ms

# JWT Configuration
    schemas: user_service
    default-schema: user_service
    create-schemas: true
jwt:
  secret: ecommerce-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration-minutes: 60
  refresh-expiration-minutes: 10080  # 7 days

# Audit Service URL (for sending audit logs)
app:
  audit-service:
    url: http://audit-service
  kafka:
    topic:
      audit: audit.events
      user: user.events

kafka:
  bootstrap-servers: localhost:9092
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
