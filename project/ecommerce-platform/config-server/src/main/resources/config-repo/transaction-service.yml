# =============================================================================
# transaction-service.yml — Config Server config for Transaction Service
# =============================================================================
server:
  port: 8085

spring:
  application:
    name: transaction-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TransactionServiceHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

        default_schema: transaction_service
  flyway:
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

app:
  kafka:
    topic:
      transaction-request:  transaction.request
      transaction-response: transaction.response
      audit:                audit.events

kafka:
  bootstrap-servers: localhost:9092
  producer:
    key-serializer:   org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    acks: all
    retries: 3
    properties:
      enable.idempotence: true
  consumer:
    group-id: transaction-service-group
    auto-offset-reset: earliest
    key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      max.poll.records: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: transaction-service

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    schemas: transaction_service
    default-schema: transaction_service
    create-schemas: true
