# audit-service/src/main/resources/application.yml
server:
  port: 8086

spring:
  application:
    name: audit-service

  config:
    import: optional:configserver:http://configuser:configpass123@localhost:8888

  cloud:
    config:
      enabled: false
      fail-fast: false

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuditServiceHikariPool
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect:        org.hibernate.dialect.PostgreSQLDialect
        default_schema: audit_service
        jdbc.batch_size: 50
        order_inserts:  true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: audit_service
    default-schema: audit_service
    create-schemas: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: audit-service-group
      auto-offset-reset: earliest
      key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      missing-topics-fatal: false
      auto-startup: false   # don't crash if Kafka is not running locally

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://eurekauser:eurekapass123@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  kafka:
    topic:
      audit: audit.events

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  packages-to-scan: com.ecommerce.auditservice.controller

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: audit-service

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    config:
      enabled: true
  kafka:
    listener:
      auto-startup: true
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
